<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery with Modal</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <section id="gallery-section">
       
            <h1 class="title">Gallery</h1>
      
       <div class="gallery-container">
        <div class="gallery-item"><img src="1.jpeg" alt="Image 1"></div>
        <div class="gallery-item"><img src="2.jpeg" alt="Image 2"></div>
        <div class="gallery-item"><img src="3.jpeg" alt="Image 3"></div>
        <div class="gallery-item"><img src="4.jpeg" alt="Image 4"></div>
        <div class="gallery-item"><img src="5.jpeg" alt="Image 5"></div>
        <div class="gallery-item"><img src="6.jpeg" alt="Image 6"></div>
        <div class="gallery-item"><img src="7.jpeg" alt="Image 7"></div>
        <div class="gallery-item"><img src="8.jpeg" alt="Image 8"></div>
        <div class="gallery-item"><img src="9.jpeg" alt="Image 9"></div>
    </div>
    <div class="lightBoxOverLay">
        <!-- <div class="modelDiv">
            <span class="close">&times;</span>
            <img src="" alt="Modal Image">
        </div> -->/

        <div class="modelDiv">
            <span class="close">&times;</span>
            <img src="" alt="Modal Image">
            <button class="prev">&#10094;</button> 
            <button class="next">&#10095;</button>
        </div>
        


    </div>

    </section>
    <script src="scripts.js"></script>
    <!-- <script src="script.js"></script> -->
    <!-- <script src="navigationBtn.js"></script> -->
</body>
</html>
